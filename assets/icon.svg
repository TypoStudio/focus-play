<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ibg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="#222c55"/>
      <stop offset="1" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="iacc" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8a98ff"/>
      <stop offset="1" stop-color="#a66bf0"/>
    </linearGradient>
    <radialGradient id="iglow" cx="0.5" cy="0.46" r="0.5">
      <stop stop-color="#7c8cf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c8cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 여백 없이 꽉 찬 배경 + 둥근 모서리 (rounded) -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#ibg)"/>
  <ellipse cx="512" cy="468" rx="430" ry="380" fill="url(#iglow)"/>

  <!-- center monitor (bright, playing) -->
  <g transform="translate(268,318)">
    <rect x="0" y="0" width="488" height="312" rx="30" fill="#0d1124" stroke="url(#iacc)" stroke-width="11"/>
    <rect x="30" y="30" width="428" height="252" rx="16" fill="#222d57"/>
    <path d="M198 128 L320 156 L198 184 Z" fill="url(#iacc)"/>
  </g>

  <!-- two dimmed side monitors -->
  <rect x="250" y="700" width="232" height="108" rx="20" fill="#0e1530" stroke="#2a3458" stroke-width="5"/>
  <rect x="542" y="700" width="232" height="108" rx="20" fill="#0e1530" stroke="#2a3458" stroke-width="5"/>

  <!-- star accents -->
  <circle cx="806" cy="300" r="16" fill="#ffd76b"/>
  <circle cx="858" cy="370" r="10" fill="#ffe8a8"/>
</svg>
