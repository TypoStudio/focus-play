<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="0" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#13172a"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7c8cf8"/>
      <stop offset="1" stop-color="#a66bf0"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#26335f"/>
      <stop offset="1" stop-color="#161e3b"/>
    </linearGradient>
    <radialGradient id="play-glow" cx="0.5" cy="0.5" r="0.6">
      <stop stop-color="#7c8cf8" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#7c8cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="560" rx="20" fill="#0a0e1a"/>

  <text x="600" y="64" text-anchor="middle" font-family="Sora, -apple-system, Helvetica, Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff">Focus on one screen, dim the rest</text>
  <text x="600" y="100" text-anchor="middle" font-family="Sora, -apple-system, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#8e99c0">Only the monitor playing fullscreen video stays bright</text>

  <!-- Monitor 1 (dimmed) -->
  <g transform="translate(70,170)">
    <rect x="0" y="0" width="300" height="190" rx="12" fill="#0d1124" stroke="#242b45" stroke-width="2"/>
    <rect x="14" y="14" width="272" height="162" rx="6" fill="#1a2240"/>
    <rect x="0" y="0" width="300" height="190" rx="12" fill="#000000" opacity="0.86"/>
    <rect x="120" y="200" width="60" height="20" fill="#161d33"/>
    <rect x="86" y="220" width="128" height="10" rx="5" fill="#161d33"/>
    <text x="150" y="108" text-anchor="middle" font-family="Sora, -apple-system, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#5a647f">DIMMED</text>
  </g>

  <!-- Monitor 2 (center, playing — bright) -->
  <g transform="translate(440,140)">
    <ellipse cx="160" cy="115" rx="220" ry="170" fill="url(#play-glow)"/>
    <rect x="0" y="0" width="320" height="210" rx="13" fill="#0d1124" stroke="url(#accent2)" stroke-width="3"/>
    <rect x="15" y="15" width="290" height="180" rx="7" fill="url(#screen)"/>
    <circle cx="160" cy="105" r="44" fill="#7c8cf8" opacity="0.22"/>
    <path d="M146 82 L190 105 L146 128 Z" fill="url(#accent2)"/>
    <rect x="40" y="168" width="240" height="6" rx="3" fill="#3a466e"/>
    <rect x="40" y="168" width="150" height="6" rx="3" fill="#7c8cf8"/>
    <rect x="130" y="220" width="60" height="22" fill="#222a44"/>
    <rect x="92" y="242" width="136" height="11" rx="5.5" fill="#222a44"/>
    <text x="160" y="44" text-anchor="middle" font-family="Sora, -apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#aeb9e6">PLAYING · FULLSCREEN</text>
  </g>

  <!-- Monitor 3 (dimmed, with cursor hint) -->
  <g transform="translate(830,170)">
    <rect x="0" y="0" width="300" height="190" rx="12" fill="#0d1124" stroke="#242b45" stroke-width="2"/>
    <rect x="14" y="14" width="272" height="162" rx="6" fill="#1a2240"/>
    <rect x="0" y="0" width="300" height="190" rx="12" fill="#000000" opacity="0.86"/>
    <rect x="120" y="200" width="60" height="20" fill="#161d33"/>
    <rect x="86" y="220" width="128" height="10" rx="5" fill="#161d33"/>
    <text x="150" y="108" text-anchor="middle" font-family="Sora, -apple-system, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#5a647f">DIMMED</text>
  </g>

  <!-- caption -->
  <text x="220" y="408" text-anchor="middle" font-family="Sora, -apple-system, Helvetica, Arial, sans-serif" font-size="15" fill="#7d88ad">Hover to brighten that screen again</text>
  <text x="600" y="408" text-anchor="middle" font-family="Sora, -apple-system, Helvetica, Arial, sans-serif" font-size="15" fill="#9aa6cf">Video screen — always bright</text>
  <text x="980" y="408" text-anchor="middle" font-family="Sora, -apple-system, Helvetica, Arial, sans-serif" font-size="15" fill="#7d88ad">Dimmed when the cursor is away</text>

  <text x="600" y="500" text-anchor="middle" font-family="Sora, -apple-system, Helvetica, Arial, sans-serif" font-size="14" fill="#5a647f">Exit fullscreen and every monitor returns to its original brightness</text>
</svg>
